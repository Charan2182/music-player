<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
 * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 20px;
}

/* MUSIC PLAYER CARD */

.player {
  width: 100%;
  max-width: 350px;

  background: rgba(255, 255, 255, 0.08);

  padding: 25px;

  border-radius: 20px;

  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  color: white;
}

/* COVER IMAGE */

.player img {
  width: 100%;
  height: 300px;

  object-fit: cover;

  border-radius: 15px;

  margin-bottom: 20px;
}

/* SONG TITLE */

.player h2 {
  font-size: 24px;
  margin-bottom: 20px;
}

/* BUTTON SECTION */

.buttons {
  display: flex;
  justify-content: center;
  align-items: center;

  gap: 15px;
}

/* BUTTON STYLE */

.buttons button {
  border: none;

  background: white;

  color: black;

  padding: 12px 16px;

  border-radius: 50%;

  font-size: 20px;

  cursor: pointer;

  transition: 0.3s;
}

.buttons button:hover {
  transform: scale(1.1);
}

/* PROGRESS BAR */

.progress-container {
  width: 100%;

  height: 6px;

  background: rgba(255,255,255,0.2);

  border-radius: 10px;

  margin: 20px 0;

  cursor: pointer;
}

.progress {
  width: 0%;

  height: 100%;

  background: white;

  border-radius: 10px;
}

/* TIME */

.time {
  display: flex;
  justify-content: space-between;

  font-size: 14px;

  margin-top: 5px;
}

/* RESPONSIVE DESIGN */

@media (max-width: 500px) {

  .player {
    padding: 20px;
  }

  .player img {
    height: 250px;
  }

  .player h2 {
    font-size: 20px;
  }

  .buttons button {
    padding: 10px 14px;
    font-size: 18px;
  }
}
    </style>
</head>
<body>
    <div class="player">
    <img
      id="cover"
      src="../music.jpg"
      alt="cover"
    >

    <h2 id="title">Song Name</h2>

    <audio id="audio"></audio>

    <div class="buttons">

      <button onclick="prevSong()">
        ⏮
      </button>

      <button onclick="playPause()">
        ▶️
      </button>

      <button onclick="nextSong()">
        ⏭
      </button>
    </div>
    <!-- PROGRESS BAR -->

<div class="progress-container" id="progressContainer">

  <div class="progress" id="progress"></div>

</div>

<div class="time">

  <span id="currentTime">0:00</span>

  <span id="duration">0:00</span>

</div>


<!-- VOLUME CONTROL -->

<input
  type="range"
  id="volume"
  min="0"
  max="1"
  step="0.1"
  value="1"
  aria-label="Volume"
  >
  </div>
  <script src="script.js"></script>
</body>
</html>
